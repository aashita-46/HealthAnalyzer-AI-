<!DOCTYPE html>
<html>
<head>
    <title>HealthScan AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark d-flex align-items-center" style="height: 100vh;">
    <div class="container text-center text-white">
        <div class="card p-5 mx-auto text-dark shadow-lg" style="max-width: 500px;">
            <h2 class="mb-4">🛒 HealthScan AI</h2>
            <form action="/analyze" method="post" enctype="multipart/form-data">
                <input type="file" name="image" class="form-control mb-3" required>
                <button type="submit" class="btn btn-primary w-100">Analyze Shelf Health</button>
            </form>
        </div>
    </div>
</body>
</html>
