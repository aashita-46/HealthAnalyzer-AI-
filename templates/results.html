<!DOCTYPE html>
<html>
<head>
    <title>HealthScan AI Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 shadow rounded">
        <h1 class="text-center text-primary mb-4">HealthScan Analysis</h1>
        <div class="row">
            <div class="col-md-5">
                <img src="{{ url_for('static', filename='uploads/' + image) }}" class="img-fluid rounded border">
            </div>
            <div class="col-md-7">
                <h4>Analysis Results</h4>
                {% for item in items %}
                <div class="card mb-2 border-{{ item.color }}">
                    <div class="card-body py-2 d-flex justify-content-between align-items-center">
                        <div>
                            <strong>{{ item.label }}</strong><br>
                            <small class="text-muted">{{ item.reason }}</small>
                        </div>
                        <span class="badge bg-{{ item.color }}">{{ item.verdict }}</span>
                    </div>
                </div>
                {% endfor %}
                <a href="/" class="btn btn-secondary mt-3">Back to Scan</a>
            </div>
        </div>
    </div>
</body>
</html>
